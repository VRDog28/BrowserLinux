<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>BrowserLinux Wiki</title>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    body {
      margin: 0;
      display: flex;
      background: #0b0b0b;
      color: white;
      font-family: Arial;
    }

    #sidebar {
      width: 220px;
      background: #111;
      height: 100vh;
      padding: 10px;
      box-sizing: border-box;
    }

    .item {
      padding: 10px;
      margin-bottom: 5px;
      background: #1a1a1a;
      cursor: pointer;
      border-radius: 4px;
      text-transform: capitalize;
    }

    .item:hover {
      background: #2a2a2a;
    }

    .active {
      background: #3a3a3a;
      font-weight: bold;
    }

    #content {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }
    #content img {
  max-width: 100%;
  height: auto;
  display: block;
  margin: 10px 0;
    }
  </style>
</head>

<body>

  <div id="sidebar"></div>
  <div id="content">Loading...</div>

  <script>
    let current = null;

    function loadPage(name) {
      const file = name + ".md";

      fetch("./" + file)
        .then(r => {
          if (!r.ok) throw new Error("Missing " + file);
          return r.text();
        })
        .then(md => {
          document.getElementById("content").innerHTML =
            marked.parse(md);

          current = name;
          updateActive();
        })
        .catch(err => {
          document.getElementById("content").innerHTML =
            "<h1>Error</h1><p>" + err + "</p>";
        });
    }

    function updateActive() {
      document.querySelectorAll(".item").forEach(el => {
        el.classList.remove("active");
        if (el.dataset.name === current) {
          el.classList.add("active");
        }
      });
    }

    fetch("pages.json")
      .then(r => r.json())
      .then(list => {
        const sidebar = document.getElementById("sidebar");

        list.forEach(name => {
          const div = document.createElement("div");
          div.className = "item";
          div.innerText = name;
          div.dataset.name = name;

          div.onclick = () => loadPage(name);

          sidebar.appendChild(div);
        });
        if (list.length > 0) {
          loadPage(list[0]);
        }
      });
  </script>

</body>
</html>
