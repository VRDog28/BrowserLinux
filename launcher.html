<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Launcher</title>
</head>
<body>
<script>
  const url = "index.html";


  window.open(url, "_blank", `
    width=800,
    height=600,
    toolbar=0,
    location=0,
    status=0,
    menubar=0,
    scrollbars=0,
    resizable=1
  `);
</script>
<p>Launching app...</p>
</body>
</html>
